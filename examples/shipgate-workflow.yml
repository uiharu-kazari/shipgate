name: ShipGate release gate

on:
  pull_request:
    branches: [main]

# One gate run per PR: a new push supersedes the in-flight preview deploy + experiments.
concurrency:
  group: shipgate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Per-PR preview: this workflow deploys the PR's ACTUAL code to a temporary
# Cloud Run service, then has ShipGate run its experiments against that build —
# so the verdict reflects the real diff, not a fixed staging app.
jobs:
  shipgate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy PR preview to Cloud Run
        id: preview
        run: |
          SERVICE="shipgate-demo-pr-${{ github.event.pull_request.number }}"
          # SHIPGATE_TESTING=1 set explicitly (not just via Dockerfile ENV) so the
          # virtual-clock header the time-warp probe relies on is always honored.
          gcloud run deploy "$SERVICE" \
            --source . \
            --project "${{ vars.GCP_PROJECT }}" \
            --region "${{ vars.GCP_REGION }}" \
            --allow-unauthenticated \
            --set-env-vars SHIPGATE_TESTING=1 \
            --quiet
          URL=$(gcloud run services describe "$SERVICE" \
            --project "${{ vars.GCP_PROJECT }}" --region "${{ vars.GCP_REGION }}" \
            --format 'value(status.url)')
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Preview: $URL"

      - name: Collect PR diff
        run: git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr.diff

      - name: Ask ShipGate for a release verdict
        id: verdict
        run: |
          jq -n --rawfile diff /tmp/pr.diff \
            --arg repo "${{ github.repository }}" \
            --arg target "${{ steps.preview.outputs.url }}" \
            --argjson pr ${{ github.event.pull_request.number }} \
            '{repo: $repo, prNumber: $pr, sha: "${{ github.sha }}", diff: $diff, targetUrl: $target}' \
          | curl -sf --max-time 300 -X POST "${{ vars.SHIPGATE_AGENT_URL }}/analyze" \
              -H 'content-type: application/json' \
              -H "x-shipgate-token: ${{ secrets.SHIPGATE_TOKEN }}" -d @- > /tmp/verdict.json
          echo "decision=$(jq -r .verdict.decision /tmp/verdict.json)" >> "$GITHUB_OUTPUT"

      - name: Comment verdict on PR
        uses: actions/github-script@v7
        with:
          script: |
            const v = require('/tmp/verdict.json');
            const icon = { ship: '🟢', 'ship-with-warnings': '🟡', block: '🔴', inconclusive: '⚪' }[v.verdict.decision];
            const preview = "${{ steps.preview.outputs.url }}";
            const body = [
              `## ${icon} ShipGate verdict: **${v.verdict.decision}**`,
              `_tested against this PR's preview deployment: ${preview}_`,
              '', v.plan.summary, '',
              '### Experiments',
              ...v.results.map(r => `- **[${r.status}]** ${r.title} — ${r.detail}`),
              '### Reasons',
              ...v.verdict.reasons.map(r => `- ${r}`),
              '### Advice',
              ...v.verdict.advice.map(a => `- ${a}`),
            ].join('\n');
            // Upsert: update our existing verdict comment instead of spamming a new
            // one on every run.
            const marker = '<!-- shipgate-verdict -->';
            const withMarker = marker + '\n' + body;
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo, issue_number: context.issue.number, per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo, comment_id: existing.id, body: withMarker,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo, issue_number: context.issue.number, body: withMarker,
              });
            }

      # Fail CLOSED, by ALLOWLIST. Only two decisions may pass; anything else — block,
      # inconclusive (no evidence), an unknown value, or an empty/failed response —
      # fails the check. A denylist would let a null/unexpected verdict merge.
      - name: Gate
        run: |
          DECISION="${{ steps.verdict.outputs.decision }}"
          case "$DECISION" in
            ship|ship-with-warnings)
              echo "ShipGate cleared this release: $DECISION" ;;
            *)
              echo "ShipGate did not clear this release: '${DECISION:-<none>}'"
              exit 1 ;;
          esac
